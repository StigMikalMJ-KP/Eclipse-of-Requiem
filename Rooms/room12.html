<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>End - Eclipse of Requiem</title>
    <link rel="stylesheet" href="../CSS/end.css">
</head>
<body>
    <main id="end-screen">
        <div class="end-content">
            <h1 class="title">Eclipse of Requiem</h1>
            <p class="subtitle">The End</p>
            
            <div class="message-container">
                <p id="end-message">Thank you for playing.</p>
            </div>
            
            <div class="stats-container" id="stats-container">
                <h2>Your Journey</h2>
                <p>Rooms Explored: <span id="rooms-explored">0</span></p>
                <p>Time Survived: <span id="time-survived">0:00</span></p>
            </div>
            
            <div class="credits">
                <p>Created with ♥</p>
            </div>
            
            <div class="buttons">
                <button id="restart-btn" type="button">Play Again</button>
                <button id="title-btn" type="button">Title Screen</button>
            </div>
        </div>
    </main>
    <script type="module" src="../JS/end.js"></script>
</body>
</html>
